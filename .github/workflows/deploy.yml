name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Testiranje Laravela
      - name: Laravel Tests
        run: |
          composer install
          cp .env.example .env
          php artisan key:generate
          vendor/bin/phpunit

      # 2. Deploy na Railway
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service your-service-name --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}