name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, gd, zip, pdo_mysql

      - name: Install PHP Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install ParaTest
        run: composer require brianium/paratest --dev --with-all-dependencies --no-interaction

      - name: Run PHP Tests
        # Koristimo SQLite u memoriji da izbegnemo potrebu za MySQL servisom u CI-u
        run: php artisan test --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Install JS Dependencies
        run: |
          cd react
          npm install

  deploy:
    needs: tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        # DODATO: --service fleg rešava problem "Multiple services found"
        # DODATO: --dockerfile fleg osigurava da koristi tvoj specifičan Dockerfile
        run: railway up --detach --service internet-tehnologije-2025-fitnesplanerapk --dockerfile Dockerfile
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}